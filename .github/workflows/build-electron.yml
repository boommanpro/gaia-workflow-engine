name: Build Electron Application

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 安装 pnpm
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    # 获取 pnpm store 目录
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    # 缓存 pnpm 依赖
    - name: Cache pnpm modules
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # 设置 JDK 21
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # 准备 extraResources 目录
    - name: Prepare extraResources Directory
      run: |
        mkdir -p apps/console/workflow-electron/build/extraResources
      shell: bash

    # 下载并嵌入JDK到应用中
    - name: Download and Embed JDK
      run: |
        case $RUNNER_OS in
          "Linux")
            wget https://download.java.net/java/GA/jdk21.0.2/f2283984656d4a079e0d90d2c3974a34/13/GPL/openjdk-21.0.2_linux-x64_bin.tar.gz -O jdk21.tar.gz
            tar -xzf jdk21.tar.gz
            mv jdk-21.0.2 apps/console/workflow-electron/build/extraResources/jdk
            ;;
          "Windows")
            curl -L https://download.java.net/java/GA/jdk21.0.2/f2283984656d4a079e0d90d2c3974a34/13/GPL/openjdk-21.0.2_windows-x64_bin.zip -o jdk21.zip
            unzip jdk21.zip
            mv jdk-21.0.2 apps/console/workflow-electron/build/extraResources/jdk
            ;;
          "macOS")
            wget https://download.java.net/java/GA/jdk21.0.2/f2283984656d4a079e0d90d2c3974a34/13/GPL/openjdk-21.0.2_macos-x64_bin.tar.gz -O jdk21.tar.gz
            tar -xzf jdk21.tar.gz
            mv jdk-21.0.2.jdk apps/console/workflow-electron/build/extraResources/jdk
            ;;
        esac
      shell: bash

    # 安装全局依赖
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      working-directory: .

    # 构建后端 Java API (Maven)
    - name: Build Backend API
      run: |
        cd apps/api/gaia-workflow
        mvn clean package -DskipTests
      shell: bash

    # 将构建的JAR复制到extraResources
    - name: Copy Backend JAR to extraResources
      run: |
        mkdir -p apps/console/workflow-electron/build/extraResources
        cp apps/api/gaia-workflow/gaia-workflow-app/target/gaia-workflow-app-*.jar apps/console/workflow-electron/build/extraResources/gaia-workflow-app.jar
      shell: bash

    # 构建前端编辑器
    - name: Build Frontend Editor
      run: |
        cd apps/console/workflow-editor
        pnpm install --frozen-lockfile
        pnpm run build:electron
      shell: bash

    # 安装 Electron 应用依赖
    - name: Install Electron Dependencies
      run: |
        cd apps/console/workflow-electron
        pnpm install --frozen-lockfile
      shell: bash

    # 在 Linux 上安装额外依赖
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libnotify-dev libgnome-keyring-dev libgconf2-dev libpulse-dev libspeechd-dev build-essential libudev-dev
      shell: bash

    # 构建 Electron 应用 (后端JAR包和前端资源)
    - name: Build Electron Application Components
      run: |
        cd apps/console/workflow-electron
        npm run build-all
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 构建特定平台的 Electron 应用
    - name: Package Electron Application
      run: |
        cd apps/console/workflow-electron
        case $RUNNER_OS in
          "Windows")
            npm run build-w
            ;;
          "Linux")
            npm run build-l
            ;;
          "macOS")
            npm run build-m
            ;;
        esac
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    # 上传构建产物
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: electron-app-${{ runner.os }}
        path: |
          apps/console/workflow-electron/out/**
        retention-days: 7

  # 如果是发布事件，则创建发布版本
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false