name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # 新增 pnpm 安装步骤
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.0  # 指定 pnpm 版本，建议与本地一致

      # 构建 Vue3 主应用
      - name: Install Vue3 App Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/console/workflow-manage

      - name: Build Vue3 Main Application
        run: pnpm run build:github
        working-directory: apps/console/workflow-manage

      # 构建 React 子应用
      - name: Install React App Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/console/workflow-editor

      - name: Build React Child Application
        run: pnpm run build:gh-pages
        working-directory: apps/console/workflow-editor

      # 准备部署目录
      - name: Prepare deployment directory
        run: |
          # 创建部署目录
          mkdir -p deployment
          mkdir -p deployment/workflow-editor
          # 复制主应用
          cp -r apps/console/workflow-manage/dist/* deployment/
          # 复制子应用
          cp -r apps/console/workflow-editor/workflow-editor/* deployment/workflow-editor/


      # 部署应用
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4.3.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: deployment
          force: true
          commit-message: website deploy

      # 清理
      - name: Cleanup
        run: |
          rm -rf deployment
          rm -rf apps/console/workflow-manage/dist
          rm -rf apps/console/workflow-editor/workflow-editor
