name: Build Backend & Frontend Components

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 设置 JDK 21
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 安装 pnpm
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    # 获取 pnpm store 目录
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    # 缓存 pnpm 依赖
    - name: Cache pnpm modules
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # 安装全局依赖
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      working-directory: .

    # 构建后端 Java API (Maven)
    - name: Build Backend API
      run: |
        cd apps/api/gaia-workflow
        mvn clean package -DskipTests
      shell: bash

    # 上传后端构建产物
    - name: Upload Backend Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-api
        path: apps/api/gaia-workflow/gaia-workflow-app/target/*.jar
        retention-days: 7

  build-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 安装 pnpm
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    # 获取 pnpm store 目录
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    # 缓存 pnpm 依赖
    - name: Cache pnpm modules
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # 安装全局依赖
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      working-directory: .

    # 构建前端编辑器
    - name: Build Frontend Editor
      run: |
        cd apps/console/workflow-editor
        pnpm install --frozen-lockfile
        pnpm run build:electron
      shell: bash

    # 上传前端构建产物
    - name: Upload Frontend Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-editor
        path: |
          apps/console/workflow-editor/dist/**
          apps/console/workflow-editor/workflow-editor/**
        retention-days: 7

  build-electron:
    needs: [build-backend, build-frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    # 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 安装 pnpm
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    # 获取 pnpm store 目录
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    # 缓存 pnpm 依赖
    - name: Cache pnpm modules
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # 设置 JDK 21
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # 准备 extraResources 目录并嵌入JDK（使用清华镜像）
    - name: Prepare extraResources and Embed JDK
      run: |
        mkdir -p apps/console/workflow-electron/build/extraResources
        
        case $RUNNER_OS in
          "Linux")
            # Download OpenJDK for Linux from Tsinghua mirror
            curl -L https://mirrors.tuna.tsinghua.edu.cn/Adoptium/21/jdk/x64/linux/OpenJDK21U-jdk_x64_linux_hotspot_21.0.10_7.tar.gz -o jdk21.tar.gz
            tar -xzf jdk21.tar.gz
            # Extracted directory name might vary, so we'll rename it to jdk
            mv jdk-* apps/console/workflow-electron/build/extraResources/jdk || mv hotspot-* apps/console/workflow-electron/build/extraResources/jdk
            ;;
          "Windows")
            # Download OpenJDK for Windows from Tsinghua mirror
            curl -L https://mirrors.tuna.tsinghua.edu.cn/Adoptium/21/jdk/x64/windows/OpenJDK21U-jdk_x64_windows_hotspot_21.0.9_10.zip -o jdk21.zip
            7z x jdk21.zip
            # Extracted directory name might vary, so we'll rename it to jdk
            mv jdk-* apps/console/workflow-electron/build/extraResources/jdk || mv hotspot-* apps/console/workflow-electron/build/extraResources/jdk
            ;;
          "macOS")
            # Download OpenJDK for macOS from Tsinghua mirror
            curl -L https://mirrors.tuna.tsinghua.edu.cn/Adoptium/21/jdk/x64/mac/OpenJDK21U-jdk_x64_mac_hotspot_21.0.9_10.tar.gz -o jdk21.tar.gz
            tar -xzf jdk21.tar.gz
            # Extracted directory name might vary, so we'll rename it to jdk
            mv jdk-* apps/console/workflow-electron/build/extraResources/jdk || mv hotspot-* apps/console/workflow-electron/build/extraResources/jdk
            ;;
        esac
      shell: bash

    # 下载之前构建的后端和前端组件
    - name: Download Backend Artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-api
        path: apps/console/workflow-electron/build/extraResources/

    - name: Download Frontend Artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-editor
        path: apps/console/workflow-editor/dist/

    # 安装全局依赖
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      working-directory: .

    # 安装 Electron 应用依赖
    - name: Install Electron Dependencies
      run: |
        cd apps/console/workflow-electron
        pnpm install --frozen-lockfile
      shell: bash

    # 在 Linux 上安装额外依赖
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libnotify-dev libgnome-keyring-dev libgconf2-dev libpulse-dev libspeechd-dev build-essential libudev-dev
      shell: bash

    # 构建 Electron 应用 (使用已构建的后端JAR包和前端资源)
    - name: Build Electron Application
      run: |
        cd apps/console/workflow-electron
        npm run build-electron
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 构建特定平台的 Electron 应用
    - name: Package Electron Application
      run: |
        cd apps/console/workflow-electron
        case $RUNNER_OS in
          "Windows")
            npm run build-w
            ;;
          "Linux")
            npm run build-l
            ;;
          "macOS")
            npm run build-m
            ;;
        esac
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    # 上传构建产物
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: electron-app-${{ runner.os }}
        path: |
          apps/console/workflow-electron/out/**
        retention-days: 7