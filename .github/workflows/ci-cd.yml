name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]

jobs:
  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14]  # 只保留macOS的两个版本：macos-14 (Apple Silicon) 和 macos-latest (Intel)
        include:
          - os: macos-14
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    # 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 安装 pnpm
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        run_install: false

    # 获取 pnpm store 目录
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    # 缓存 pnpm 依赖
    - name: Cache pnpm modules
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # 设置 JDK 21
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # 准备 extraResources 目录
    - name: Prepare extraResources Directory
      run: |
        mkdir -p apps/console/workflow-electron/build/extraResources
      shell: bash

    # 下载并嵌入JDK到应用中（使用清华镜像）
    - name: Download and Embed JDK
      run: |
        mkdir -p apps/console/workflow-electron/build/extraResources
        
        case $RUNNER_OS in
          "macOS")
            # 检测架构并下载相应的JDK
            if [[ $(uname -m) == "arm64" ]]; then
              # 下载适用于macOS ARM64的OpenJDK（最新版本）
              curl -L https://mirrors.tuna.tsinghua.edu.cn/Adoptium/21/jdk/aarch64/mac/OpenJDK21U-jdk_aarch64_mac_hotspot_21.0.10_12.tar.gz -o jdk21.tar.gz
            else
              # 下载适用于macOS x64的OpenJDK（最新版本）
              curl -L https://mirrors.tuna.tsinghua.edu.cn/Adoptium/21/jdk/x64/mac/OpenJDK21U-jdk_x64_mac_hotspot_21.0.10_12.tar.gz -o jdk21.tar.gz
            fi
            tar -xzf jdk21.tar.gz
            # 提取的目录名可能有所不同，因此重命名为jdk
            mv jdk-* apps/console/workflow-electron/build/extraResources/jdk || mv hotspot-* apps/console/workflow-electron/build/extraResources/jdk
            
            # 对于macOS，处理JDK目录结构，移除Contents/Resources/extraResources/jdk/Contents/Home/层级
            if [ -d "apps/console/workflow-electron/build/extraResources/jdk/Contents/Home" ]; then
              echo "Adjusting macOS JDK directory structure..."
              # 将Contents/Home/下的内容移动到jdk根目录
              mv apps/console/workflow-electron/build/extraResources/jdk/Contents/Home/* apps/console/workflow-electron/build/extraResources/jdk/
              # 删除多余的Contents目录
              rm -rf apps/console/workflow-electron/build/extraResources/jdk/Contents
            fi
            ;;
        esac
      shell: bash

    # 安装 Electron 应用依赖
    - name: Install Electron Dependencies
      run: |
        cd apps/console/workflow-electron
        pnpm install --frozen-lockfile
      shell: bash

    # 构建 Electron 应用 (整合后端JAR包和前端资源)
    - name: Build Electron Application
      run: |
        cd apps/console/workflow-electron
        npm run build-all
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 根据操作系统打包 Electron 应用
    - name: Package Electron Application
      run: |
        cd apps/console/workflow-electron
        if [ "$RUNNER_OS" == "macOS" ]; then
          # 检测架构并相应构建
          if [[ $(uname -m) == "arm64" ]]; then
            # 在 Apple Silicon 上构建 arm64 版本
            echo "Building for macOS ARM64 architecture"
            npm run build-m-arm64
          else
            # 在 Intel 上构建 x64 版本
            echo "Building for macOS x64 architecture"
            npm run build-m
          fi
        fi
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    # 上传构建产物
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: electron-app-${{ runner.os }}-${{ matrix.arch }}
        path: |
          apps/console/workflow-electron/out/**
        retention-days: 14

  # 当创建标签时，准备发布
  release:
    needs: build-electron
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: releases

    - name: Prepare release assets
      run: |
        mkdir -p release_assets
        find releases -name "*.dmg" -o -name "*.pkg" | xargs -I {} cp {} release_assets/
        # 列出所有找到的资产用于调试
        echo "Release assets found:"
        ls -la release_assets/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release_assets/**
        draft: false
        prerelease: false
        body: "Release of FlowGram AI Desktop Application"
