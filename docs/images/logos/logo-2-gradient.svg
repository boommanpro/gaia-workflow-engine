  <circle cx="128" cy="128" r="9" fill="#ffffff"/>
  <circle cx="186" cy="128" r="7" fill="#ffffff"/>
  <circle cx="128" cy="96" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="128" cy="160" r="5" fill="#ffffff" opacity="0.8"/>
