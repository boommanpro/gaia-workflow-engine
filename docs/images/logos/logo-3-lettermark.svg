  <!-- 节点（构成 G 的关键点） -->
  <circle cx="168" cy="96" r="10" fill="#4d53e8"/>
  <circle cx="96" cy="104" r="8" fill="#6366f1"/>
  <circle cx="72" cy="136" r="8" fill="#6366f1"/>
  <circle cx="96" cy="168" r="8" fill="#6366f1"/>
  <circle cx="168" cy="176" r="10" fill="#4d53e8"/>
  <circle cx="168" cy="144" r="8" fill="#4d53e8"/>
  <circle cx="132" cy="144" r="10" fill="#4d53e8"/>
  <!-- 连接线（电路风） -->
  <line x1="168" y1="96" x2="168" y2="144" stroke="#4d53e8" stroke-width="2" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="168" y1="144" x2="132" y2="144" stroke="#4d53e8" stroke-width="2" opacity="0.3" stroke-dasharray="3,3"/>
</svg>
